AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ProjectHub – serverless REST API (public, no VPC)

# ── Parameters ────────────────────────────────────────────────────────────────

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, staging]
    Description: Deployment environment (used as API Gateway stage name)

  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string (e.g. postgresql://user:pass@host:5432/projecthub)

  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret (256-bit hex string)

  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key (sk-ant-...)

  CorsOrigins:
    Type: String
    Default: https://projecthub.farmwiseai.com
    Description: Allowed CORS origin – the frontend URL (no trailing slash)

# ── Globals ───────────────────────────────────────────────────────────────────

Globals:
  Function:
    Runtime: python3.10
    Architectures: [x86_64]
    MemorySize: 512
    Timeout: 30
    Tracing: Active
    CodeUri: .
    Layers:
      - !Ref DepsLayer
    Environment:
      Variables:
        ENVIRONMENT: !Ref Env
        DATABASE_URL: !Ref DatabaseUrl
        JWT_SECRET: !Ref JwtSecret
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        ANTHROPIC_MODEL: claude-sonnet-4-6
        JWT_ACCESS_EXPIRE_MINUTES: '480'
        DB_POOL_MIN: '1'
        DB_POOL_MAX: '5'
        CORS_ORIGINS: !Ref CorsOrigins
    Tags:
      Project: ProjectHub
      Environment: !Ref Env
      ManagedBy: SAM

# ── Resources ─────────────────────────────────────────────────────────────────

Resources:

  # ── Lambda Layer (shared Python dependencies) ───────────────────────────────

  DepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub projecthub-deps-${Env}
      Description: Shared Python dependencies for all ProjectHub Lambda functions
      ContentUri: layer/
      CompatibleRuntimes:
        - python3.10
      CompatibleArchitectures:
        - x86_64
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: python3.10

  # ── API Gateway – public REST API (no VPC) ──────────────────────────────────
  #
  # CORS is handled entirely by the Lambda handlers (see base.py make_handler).
  # ALL methods including OPTIONS are proxied to Lambda; do not set Cors here
  # or API Gateway will intercept OPTIONS before Lambda can respond.

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub projecthub-api-${Env}
      StageName: !Ref Env
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp",
          "method":"$context.httpMethod","path":"$context.path",
          "status":"$context.status","responseLength":"$context.responseLength",
          "integrationLatency":"$context.integrationLatency",
          "responseLatency":"$context.responseLatency",
          "userAgent":"$context.identity.userAgent",
          "errorMessage":"$context.error.message"}
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          LoggingLevel: ERROR
          DataTraceEnabled: false
          ThrottlingRateLimit: 200
          ThrottlingBurstLimit: 400

  # ── CloudWatch Log Groups (explicit to control retention) ───────────────────

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/projecthub-${Env}
      RetentionInDays: 30

  HealthLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-health-${Env}
      RetentionInDays: 14

  AuthLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-auth-${Env}
      RetentionInDays: 30

  UsersLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-users-${Env}
      RetentionInDays: 30

  ProjectsLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-projects-${Env}
      RetentionInDays: 30

  TasksLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-tasks-${Env}
      RetentionInDays: 30

  PhasesLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-phases-${Env}
      RetentionInDays: 30

  AnalyticsLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-analytics-${Env}
      RetentionInDays: 30

  AILogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-ai-${Env}
      RetentionInDays: 30

  CaptureLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-capture-${Env}
      RetentionInDays: 30

  DiscussionsLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-discussions-${Env}
      RetentionInDays: 30

  ReviewsLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-reviews-${Env}
      RetentionInDays: 30

  StandupLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-standup-${Env}
      RetentionInDays: 14

  SubmissionsLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-submissions-${Env}
      RetentionInDays: 30

  LeaveLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/projecthub-leave-${Env}
      RetentionInDays: 30

  # ── Lambda Functions ────────────────────────────────────────────────────────
  #
  # Each function owns a single API domain. Routes within the domain are
  # dispatched by make_handler() inside the Lambda (regex routing in base.py).
  #
  # Two events per domain: base path (/api/x) + sub-paths (/api/x/{proxy+}).
  # Both needed because API GW {proxy+} requires at least one path segment.
  #
  # API Gateway max integration timeout is 29 s. Lambda timeouts >29 s are
  # useful for direct invocations and async patterns only.

  # ── Health ──────────────────────────────────────────────────────────────────

  HealthFunction:
    Type: AWS::Serverless::Function
    DependsOn: HealthLogGroup
    Properties:
      FunctionName: !Sub projecthub-health-${Env}
      Handler: src.handlers.health.handler
      Description: GET /health – lightweight liveness probe
      MemorySize: 128
      Timeout: 10
      Events:
        HealthGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /health
            Method: GET
    Metadata:
      BuildMethod: python3.10

  # ── Auth ────────────────────────────────────────────────────────────────────

  AuthFunction:
    Type: AWS::Serverless::Function
    DependsOn: AuthLogGroup
    Properties:
      FunctionName: !Sub projecthub-auth-${Env}
      Handler: src.handlers.auth.handler
      Description: /api/auth – login, logout, me, register, change-password
      Events:
        AuthProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/auth/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Users ───────────────────────────────────────────────────────────────────

  UsersFunction:
    Type: AWS::Serverless::Function
    DependsOn: UsersLogGroup
    Properties:
      FunctionName: !Sub projecthub-users-${Env}
      Handler: src.handlers.users.handler
      Description: /api/users – CRUD, tasks, leave per user
      Events:
        UsersBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/users
            Method: ANY
        UsersProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/users/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Projects ────────────────────────────────────────────────────────────────

  ProjectsFunction:
    Type: AWS::Serverless::Function
    DependsOn: ProjectsLogGroup
    Properties:
      FunctionName: !Sub projecthub-projects-${Env}
      Handler: src.handlers.projects.handler
      Description: /api/projects – CRUD, kanban, timeline, search, updates, insights
      MemorySize: 768
      Events:
        ProjectsBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/projects
            Method: ANY
        ProjectsProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/projects/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Tasks ───────────────────────────────────────────────────────────────────

  TasksFunction:
    Type: AWS::Serverless::Function
    DependsOn: TasksLogGroup
    Properties:
      FunctionName: !Sub projecthub-tasks-${Env}
      Handler: src.handlers.tasks.handler
      Description: /api/tasks – CRUD, steps, milestones, deadline extensions
      Events:
        TasksBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/tasks
            Method: ANY
        TasksProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/tasks/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Phases ──────────────────────────────────────────────────────────────────

  PhasesFunction:
    Type: AWS::Serverless::Function
    DependsOn: PhasesLogGroup
    Properties:
      FunctionName: !Sub projecthub-phases-${Env}
      Handler: src.handlers.phases.handler
      Description: /api/phases – CRUD, sign-offs, attachments
      Events:
        PhasesBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/phases
            Method: ANY
        PhasesProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/phases/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Analytics ───────────────────────────────────────────────────────────────

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    DependsOn: AnalyticsLogGroup
    Properties:
      FunctionName: !Sub projecthub-analytics-${Env}
      Handler: src.handlers.analytics.handler
      Description: /api/analytics – dashboard, team-health, velocity, workload, notifications
      MemorySize: 512
      Events:
        AnalyticsProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/analytics/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── AI ──────────────────────────────────────────────────────────────────────
  #
  # Lambda timeout 90 s for direct / async invocations.
  # API Gateway integration timeout is hard-capped at 29 s; synchronous calls
  # via the API will receive 504 if Claude takes longer than 29 s.

  AIFunction:
    Type: AWS::Serverless::Function
    DependsOn: AILogGroup
    Properties:
      FunctionName: !Sub projecthub-ai-${Env}
      Handler: src.handlers.ai.handler
      Description: /api/ai – plan generation, stack suggestion, review, insights
      Timeout: 90
      Events:
        AIProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/ai/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Capture ─────────────────────────────────────────────────────────────────

  CaptureFunction:
    Type: AWS::Serverless::Function
    DependsOn: CaptureLogGroup
    Properties:
      FunctionName: !Sub projecthub-capture-${Env}
      Handler: src.handlers.capture.handler
      Description: /api/capture – session parsing with Claude AI (asyncio.run)
      Timeout: 90
      MemorySize: 512
      Events:
        CaptureBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/capture
            Method: ANY
        CaptureProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/capture/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Discussions ─────────────────────────────────────────────────────────────

  DiscussionsFunction:
    Type: AWS::Serverless::Function
    DependsOn: DiscussionsLogGroup
    Properties:
      FunctionName: !Sub projecthub-discussions-${Env}
      Handler: src.handlers.discussions.handler
      Description: /api/discussions – threaded discussion boards
      Events:
        DiscussionsBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/discussions
            Method: ANY
        DiscussionsProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/discussions/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Reviews ─────────────────────────────────────────────────────────────────

  ReviewsFunction:
    Type: AWS::Serverless::Function
    DependsOn: ReviewsLogGroup
    Properties:
      FunctionName: !Sub projecthub-reviews-${Env}
      Handler: src.handlers.reviews.handler
      Description: /api/reviews – code and submission review workflows
      Events:
        ReviewsBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/reviews
            Method: ANY
        ReviewsProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/reviews/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Standup ─────────────────────────────────────────────────────────────────

  StandupFunction:
    Type: AWS::Serverless::Function
    DependsOn: StandupLogGroup
    Properties:
      FunctionName: !Sub projecthub-standup-${Env}
      Handler: src.handlers.standup.handler
      Description: /api/standup – daily standup entries and 90-day history
      MemorySize: 256
      Events:
        StandupBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/standup
            Method: ANY
        StandupProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/standup/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Submissions ─────────────────────────────────────────────────────────────
  #
  # Also owns /api/feedback and /api/checkpoints (defined in submissions.py).

  SubmissionsFunction:
    Type: AWS::Serverless::Function
    DependsOn: SubmissionsLogGroup
    Properties:
      FunctionName: !Sub projecthub-submissions-${Env}
      Handler: src.handlers.submissions.handler
      Description: /api/submissions + /api/feedback + /api/checkpoints
      Events:
        SubmissionsBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/submissions
            Method: ANY
        SubmissionsProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/submissions/{proxy+}
            Method: ANY
        FeedbackCreate:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/feedback
            Method: ANY
        CheckpointsCreate:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/checkpoints
            Method: ANY
    Metadata:
      BuildMethod: python3.10

  # ── Leave ───────────────────────────────────────────────────────────────────

  LeaveFunction:
    Type: AWS::Serverless::Function
    DependsOn: LeaveLogGroup
    Properties:
      FunctionName: !Sub projecthub-leave-${Env}
      Handler: src.handlers.leave.handler
      Description: /api/leave – requests, approval, team availability calendar
      Events:
        LeaveBase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/leave
            Method: ANY
        LeaveProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/leave/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.10

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: Public API base URL (set NEXT_PUBLIC_API_URL to this value)
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Env}
    Export:
      Name: !Sub ProjectHub-ApiUrl-${Env}

  ApiId:
    Description: API Gateway REST API ID
    Value: !Ref Api
    Export:
      Name: !Sub ProjectHub-ApiId-${Env}

  DepsLayerArn:
    Description: Lambda Layer ARN for shared Python dependencies
    Value: !Ref DepsLayer
    Export:
      Name: !Sub ProjectHub-DepsLayerArn-${Env}

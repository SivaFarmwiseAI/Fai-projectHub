# ── ProjectHub SAM CLI Configuration ──────────────────────────────────────────
#
# Usage:
#   sam build                          # build all functions + layer
#   sam deploy                         # deploy to production
#   sam deploy --config-env staging    # deploy to staging
#   sam deploy --guided                # first-time interactive setup
#
# Before first deploy:
#   Create an S3 bucket for SAM artifacts:
#     aws s3 mb s3://YOUR-SAM-ARTIFACTS-BUCKET --region ap-south-1
#   Then replace YOUR-SAM-ARTIFACTS-BUCKET below.

version = 0.1

# ── Shared build settings (all environments) ──────────────────────────────────

[default.global.parameters]
stack_name = "projecthub-api"

[default.build.parameters]
# use_container builds inside Amazon Linux so psycopg2-binary links correctly.
use_container = false
parallel      = true
cached        = true
# Build output goes to C: (more free space) instead of filling D: drive
build_dir     = "C:/sam-build/projecthub"

# ── Production ────────────────────────────────────────────────────────────────

[default.deploy.parameters]
stack_name        = "fai-projecthub-api-dev"
s3_bucket         = "fai-projecthub"
s3_prefix         = "projecthub/api"
region            = "ap-south-1"
profile           = "AWSAdministratorAccess-448658736283"
confirm_changeset = true
capabilities      = "CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
fail_on_empty_changeset = false
parameter_overrides = [
  "Env=dev",
  "CorsOrigins=*",
  "CloudfrontURL=d1grosfd6tfgrs.cloudfront.net",
  "DocumentsBucketName=fai-projecthub",
  "DatabaseUrl=postgresql://postgres:F%40rmAI%21@14.97.231.114:5432/ProjectHub",
  "JwtSecret=7b9c3e9f6a1d4c1a5d8f0c4b7a2e9d3c5f8b1a6c9d2e4f7a8b0c1d3e5f6a7b9",
  "AnthropicApiKey=sk-ant-REPLACE",
]
tags = "Project=ProjectHub Environment=dev Team=FarmwiseAI ManagedBy=SAM"

# ── Staging ───────────────────────────────────────────────────────────────────

[staging.deploy.parameters]
stack_name        = "projecthub-api-staging"
s3_bucket         = "YOUR-SAM-ARTIFACTS-BUCKET"
s3_prefix         = "projecthub/api"
region            = "ap-south-1"
confirm_changeset = false
capabilities      = "CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
fail_on_empty_changeset = false
parameter_overrides = [
  "Env=staging",
  "CorsOrigins=https://staging.projecthub.farmwiseai.com",
  "DatabaseUrl=postgresql://projecthub_app:REPLACE_DB_PASSWORD@REPLACE_DB_HOST:5432/projecthub_staging",
  "JwtSecret=REPLACE_WITH_256BIT_HEX_SECRET",
  "AnthropicApiKey=sk-ant-REPLACE",
]
tags = "Project=ProjectHub Environment=staging Team=FarmwiseAI ManagedBy=SAM"
